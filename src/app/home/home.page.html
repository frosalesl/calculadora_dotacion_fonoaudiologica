<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Mis Aplicaciones</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding bg-page">
  <!-- Header colapsable para iOS -->
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Mis Aplicaciones</ion-title>
    </ion-toolbar>
  </ion-header>

  <p class="welcome-text">Selecciona la herramienta que necesitas utilizar hoy:</p>

  <!-- GRID DE TARJETAS -->
  <div class="cards-grid">

    <!-- CARD 1: DOFO (Calculadora de Dotación Fonoaudiológica) -->
    <!-- El atributo routerLink usa la ruta exacta configurada en app.routes.ts -->
    <ion-card class="app-card dofo-theme" routerLink="/dofo" button="true">
      <div class="card-icon-container">
        <ion-icon name="calculator-outline"></ion-icon>
      </div>
      <ion-card-header>
        <ion-card-title>DOFO</ion-card-title>
        <ion-card-subtitle>Cálculo de Dotación</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        Calculadora de dotación fonoaudiológica basada en horas cama e indicadores clínicos.
      </ion-card-content>
    </ion-card>
